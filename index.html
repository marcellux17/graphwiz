<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/src/style.css" />
        <script type="module" src="/src/main.ts" defer></script>
    </head>
    <body>
        <div id="edit-container">
            <div id="message-box" class="message-box">Select mode on the toolbar</div>
            <div id="container"></div>
            <div id="modify-graph">
                <button id="add-edge">add edge</button>
                <button id="add-node">add node</button>
                <button id="delete-mode">delete</button>
                <button id="focus-view">focus view</button>
                <button id="escape-mode">escape current editing mode</button>
                <button id="run-animation">run animation</button>
                <div id="change-data" class="hide">
                    <label for="label" id="label-message" ></label>
                    <input type="text" id="change-label" maxlength="10" />
                    <!-- <p class="message-box hidden"></p> -->
                </div>
            </div>
        </div>
    </body>
</html>
